<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cody Brock — Platform &amp; Infrastructure Engineer</title>
  <meta name="description" content="Cody Brock is a software engineer specializing in platform and infrastructure work: Kubernetes, GCP, Terraform, and zero-downtime migrations at fleet scale.">
  <meta property="og:title" content="Cody Brock — Platform &amp; Infrastructure Engineer">
  <meta property="og:description" content="I build and operate cloud infrastructure for multi-tenant SaaS.">
  <meta property="og:url" content="https://codybrock.dev">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
  <style>
    :root {
      --bg: #fdfdfc;
      --text: #1a1a18;
      --muted: #6b6b66;
      --accent: #205ea6;
      --rule: #e4e4e0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16181d;
        --text: #e8e6e3;
        --muted: #9a9a94;
        --accent: #7aa5d8;
        --rule: #2c2f36;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-serif, "Iowan Old Style", Georgia, "Times New Roman", serif;
      font-size: 1.125rem;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 40rem;
      margin: 0 auto;
      padding: 5rem 1.5rem 4rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .role {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      margin-top: 0.5rem;
    }
    .place {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.25rem 0;
    }
    p + p { margin-top: 1.25rem; }
    a { color: var(--accent); text-decoration-thickness: 1px; text-underline-offset: 2px; }
    a:hover { text-decoration-thickness: 2px; }
    nav {
      margin-top: 2.5rem;
      padding-top: 1.75rem;
      border-top: 1px solid var(--rule);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
    }
    nav a + a { margin-left: 1.5rem; }
    @media (max-width: 480px) {
      main { padding-top: 3.5rem; }
      h1 { font-size: 1.65rem; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Cody Brock</h1>
      <p class="role">Software Engineer — Platform &amp; Infrastructure</p>
      <p class="place">Berkeley, CA</p>
    </header>

    <hr>

    <p>I build and operate cloud infrastructure for multi-tenant SaaS — Kubernetes, GCP, Terraform, ArgoCD. Since 2021 I&rsquo;ve been doing that at <a href="https://bevy.com">Bevy</a>.</p>

    <nav>
      <a href="https://github.com/cody-brock">GitHub</a><a href="https://www.linkedin.com/in/cody-brock-dev/">LinkedIn</a><a href="mailto:codylewisbrock@gmail.com">Email</a>
    </nav>
  </main>
</body>
</html>
